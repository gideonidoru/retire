name: Deploy Website over SFTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🚀 SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USERNAME }}
        server: ${{ secrets.SFTP_HOST }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        local_path: './'
        remote_path: 'i6d/retire/'
        # Passes exclusion flags directly to the underlying transfer command
        sftpArgs: '-F /dev/null -o Globals=none --exclude=.git/ --exclude=.github/ --exclude=.DS_Store'
