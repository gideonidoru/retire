name: Deploy Website over SFTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # This physically removes the directories from the virtual machine runner before sync
    - name: 🧹 Clean development metadata files
      run: |
        rm -rf .git
        rm -rf .github
        find . -name ".DS_Store" -depth -exec rm {} \;

    - name: 🚀 SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USERNAME }}
        server: ${{ secrets.SFTP_HOST }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        local_path: './'
        remote_path: 'i6d/retire/'
