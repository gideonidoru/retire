    - name: 🚀 SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USERNAME }}
        server: ${{ secrets.SFTP_HOST }}
        password: ${{ secrets.SFTP_PASSWORD }} # Delete this line if using an SSH key instead
        port: 22
        local_dir: '.' # The folder in GitHub you want to upload ('.' uploads everything)
        remote_dir: '/retire/' # Replace with your actual server destination path
